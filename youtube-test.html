<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>YouTube Latest Video Test</title>
  <style>
    body { font-family: sans-serif; padding: 24px; background: #f0f0f0; }
    .test { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 24px; }
    h2 { margin: 0 0 8px; font-size: 15px; }
    p { margin: 0 0 12px; font-size: 13px; color: #555; font-family: monospace; word-break: break-all; }
    iframe { width: 100%; aspect-ratio: 16/9; border: none; border-radius: 6px; }
    #status { font-size: 13px; color: #555; margin-bottom: 12px; }
    #status.error { color: #c00; }
    #status.ok { color: #080; }
  </style>
</head>
<body>
  <h1>YouTube Latest Video Test</h1>

  <div class="test">
    <h2>Latest video from channel (via RSS)</h2>
    <p id="embed-url">Fetching...</p>
    <p id="status">Loading...</p>
    <iframe id="yt-embed" src="" allowfullscreen style="display:none;"></iframe>
  </div>

  <script>
    fetch('/.netlify/functions/latest-sermon')
      .then(res => res.json())
      .then(data => {
        if (data.error) throw new Error(data.error);

        const embedSrc = `https://www.youtube.com/embed/${data.videoId}`;
        document.getElementById('embed-url').textContent = embedSrc;
        document.getElementById('status').textContent = `Video ID: ${data.videoId}`;
        document.getElementById('status').className = 'ok';

        const iframe = document.getElementById('yt-embed');
        iframe.src = embedSrc;
        iframe.style.display = 'block';
      })
      .catch(err => {
        document.getElementById('embed-url').textContent = '/.netlify/functions/latest-sermon';
        document.getElementById('status').textContent = `Error: ${err.message}`;
        document.getElementById('status').className = 'error';
        console.error('Function fetch failed:', err);
      });
  </script>
</body>
</html>
