backend:
  name: git-gateway
  branch: cms-content

publish_mode: editorial_workflow

logo_url: /images/NNC-Logo-25-1_logo.jpg

media_folder: images
public_folder: /images

collections:
  - name: events
    label: Events
    files:
      - name: events_list
        label: Events
        file: data/events.json
        fields:
          - name: events
            label: Events
            widget: list
            fields:
              - {name: title, label: Title, widget: string}
              - {name: date, label: Sort Date, widget: string, hint: "YYYY-MM-DD format used for sorting, e.g. 2026-07-04"}
              - {name: month, label: Month, widget: string, hint: "Short uppercase month, e.g. JUL"}
              - {name: day, label: Day, widget: string, hint: "Day number, e.g. 4"}
              - {name: time, label: Time, widget: string, hint: "e.g. 3:00 PM"}
              - {name: description, label: Description, widget: text}
              - {name: link, label: Learn More URL, widget: string, required: false}

  - name: classes
    label: Classes
    files:
      - name: classes_list
        label: All Classes
        file: data/classes.json
        fields:
          - name: sundaySchool
            label: Sunday School Classes
            widget: list
            fields:
              - {name: title, label: Title, widget: string}
              - {name: description, label: Description, widget: text}
              - {name: leader, label: Leader, widget: string, required: false, hint: "e.g. Led by Patrick McNeill"}
              - {name: time, label: Time, widget: string, hint: "e.g. Sundays · 9:30 AM"}
              - {name: icon, label: Icon, widget: string, required: false}
          - name: midweek
            label: Midweek Classes
            widget: list
            fields:
              - {name: title, label: Title, widget: string}
              - {name: description, label: Description, widget: text}
              - {name: leader, label: Leader, widget: string, required: false, hint: "e.g. Led by Pastor James"}
              - {name: time, label: Time, widget: string, hint: "e.g. Wednesdays · 7:00 PM"}
              - {name: icon, label: Icon, widget: string, required: false}

  - name: ministries
    label: Ministries
    files:
      - name: ministries_list
        label: Ministries
        file: data/ministries.json
        fields:
          - name: ministries
            label: Ministries
            widget: list
            fields:
              - {name: title, label: Title, widget: string}
              - {name: description, label: Description, widget: text}
              - {name: color, label: Color, widget: color}
              - {name: icon, label: Icon, widget: string, required: false}
              - {name: link, label: Link URL, widget: string, required: false}
              - {name: linkText, label: Link Text, widget: string, required: false}

  - name: leadership
    label: Leadership
    files:
      - name: leadership_list
        label: Leadership Team
        file: data/leadership.json
        fields:
          - name: leaders
            label: Leaders
            widget: list
            fields:
              - {name: name, label: Name, widget: string}
              - {name: title, label: Title, widget: string}
              - {name: photo, label: Photo, widget: image, required: false}

  - name: sermon
    label: Sermon Series
    files:
      - name: sermon_series
        label: Current Sermon Series
        file: data/sermon.json
        fields:
          - {name: series, label: Series Name, widget: string}
          - {name: subtitle, label: Subtitle, widget: text}

  - name: livestream
    label: Livestream
    files:
      - name: livestream_settings
        label: Livestream Settings
        file: data/livestream.json
        fields:
          - name: mode
            label: Watch Section Mode
            widget: select
            options:
              - {label: "Off — show Next Service card", value: "off"}
              - {label: "Live — embed a live stream", value: "live"}
              - {label: "Playlist — show YouTube playlist", value: "playlist"}
            default: "off"
            hint: "Controls what appears in the Watch section. Switch to Live during a service, Playlist between series, Off otherwise."
          - {name: youtubeLiveVideoId, label: YouTube Live Video ID, widget: string, required: false, hint: "Mode: Live only. Video ID from the YouTube live link, e.g. h6sND0rm30g — update each service. Takes priority over Facebook and Rumble."}
          - {name: facebookLiveVideoUrl, label: Facebook Live Video URL, widget: string, required: false, hint: "Mode: Live only. Full Facebook video URL, e.g. https://www.facebook.com/NeoshoNaz/videos/1234567890. Used if YouTube ID is empty."}
          - {name: rumbleLiveVideoId, label: Rumble Live Video ID, widget: string, required: false, hint: "Mode: Live only. Video ID from the Rumble embed code, e.g. v762p0e. Used if YouTube and Facebook are both empty."}
          - {name: youtubePlaylistId, label: YouTube Playlist ID, widget: string, required: false, hint: "Mode: Playlist only. Playlist ID from YouTube, e.g. PLxxxxxxxx"}
          - {name: nextService, label: Next Service Text, widget: string, hint: "Shown when mode is Off (or Live/Playlist with no embed set). e.g. Join us this Sunday at 10:30 AM"}
          - {name: youtubeChannelUrl, label: YouTube Channel URL, widget: string}
